name: Pillowcheck
options:
  bundleIdPrefix: com.shimondeitel.pillowreminder
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Pillowcheck:
    type: application
    platform: iOS
    sources:
      - path: Pillowcheck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.pillowreminder
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Pillowcheck/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PillowcheckTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PillowcheckTests
      - path: Pillowcheck.storekit
    dependencies:
      - target: Pillowcheck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.pillowreminder.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PillowcheckUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PillowcheckUITests
    dependencies:
      - target: Pillowcheck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.pillowreminder.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Pillowcheck:
    build:
      targets:
        Pillowcheck: all
        PillowcheckTests: [test]
        PillowcheckUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Pillowcheck.storekit
    test:
      config: Debug
      storeKitConfiguration: Pillowcheck.storekit
      targets:
        - PillowcheckTests
        - PillowcheckUITests
    archive:
      config: Release
